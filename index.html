<!DOCTYPE html>
<html lang="de">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ROKKO! Records</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<!-- INTRO -->
<div id="intro">
    <video id="introVideo" autoplay muted playsinline></video>

    <div class="intro-ui">
        <div id="closeIntro" class="btn-x">✕</div>
        <div id="muteBtn" class="btn-mute">Mute</div>
    </div>
</div>

<!-- GRID -->
<section class="artist-grid" id="artistGrid"></section>

<!-- SHOP -->
<section class="shop">
    <a href="https://shop.example.com" target="_blank">
        <img src="images/shop.png">
    </a>
</section>

<!-- NEWSLETTER -->
<section class="newsletter">
    <h2>Newsletter</h2>
    <input type="email" placeholder="Email">
    <label><input type="checkbox"> DSGVO akzeptieren</label>
    <button>Submit</button>
</section>

<!-- POPUP -->
<div id="popup" class="popup hidden">
    <div id="closePopup" class="popup-close">✕</div>

    <img id="popupImage" class="popup-image">
    <h1 id="popupName"></h1>
    <p id="popupBio"></p>

    <div id="popupIcons" class="icon-grid"></div>
</div>

<script src="script.js"></script>
</body>
</html>
