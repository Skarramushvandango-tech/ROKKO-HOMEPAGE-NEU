<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ROKKO! Records</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<!-- INTRO -->
<div id="intro" class="intro">
    <video id="introVideo" autoplay muted playsinline></video>

    <div class="intro-ui">
        <div class="intro-close">X</div>
        <div class="intro-unmute">Unmute</div>
    </div>
</div>

<header class="header">
    <img src="images/header.png" alt="ROKKO">
</header>

<div class="container">

<!-- WELCOME -->
<section class="card a">
    <h1>Willkommen bei ROKKO! Records</h1>
    <p>Independent Label für elektronische Musik.</p>
</section>

<!-- ARTISTS -->
<section class="card b">

    <div class="artist-grid">

        <img src="images/anger-uschis.png" class="artist">
        <img src="images/silberstreif.png" class="artist">

        <img src="images/henri-bellieu.png" class="artist">
        <img src="images/fleur-et-beunie.png" class="artist">

        <img src="images/sukram.png" class="artist">
        <img src="images/skaramush-vandango.png" class="artist">

        <img src="images/anthony-sinclair.png" class="artist">

    </div>

</section>

<!-- MERCH -->
<section class="card a">
    <a href="https://rokko-records.myspreadshop.de" target="_blank">
        <img src="images/merch.png" class="merch">
    </a>
</section>

<!-- NEWSLETTER -->
<section class="card b">
    <input type="email" placeholder="Email">
    <button>Join</button>
</section>

<!-- IMPRESSUM -->
<section class="card a">
    <p>Impressum</p>
</section>

</div>

<!-- POPUP -->
<div id="popup" class="popup hidden">
    <div class="popup-close">X</div>
    <h1 id="popupName"></h1>
    <p id="popupBio"></p>
</div>

<script src="script.js"></script>
</body>
</html>
