<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROKKO! Records</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

<!-- VIDEO -->
<div id="videoPopup" class="video-popup hidden">
    <div class="video-container">
        <button class="close-popup" onclick="closeVideoPopup()">×</button>

        <video id="introVideo" autoplay muted playsinline>
            <source src="videos/intro-web.mp4" type="video/mp4">
            <source src="videos/intro-mobile.mp4" type="video/mp4">
        </video>

        <button class="mute-btn" onclick="toggleMute()">Unmute</button>
    </div>
</div>

<!-- ARTIST MODAL -->
<div id="artistModal" class="artist-modal hidden">
    <div class="modal-content">
        <button class="close-popup" onclick="closeArtistModal()">×</button>
        <img id="modalArtistImage">
        <h2 id="modalArtistName"></h2>
        <p id="modalArtistBio"></p>
        <div id="modalStreamingLinks"></div>
    </div>
</div>

<div class="container">

    <!-- HEADER -->
    <header class="header">
        <img src="images/header.png" class="header-image">
    </header>

    <!-- WELCOME -->
    <section class="welcome-section">
        <div class="welcome-banner">Willkommen</div>
        <div class="welcome-box">
            <h1>ROKKO! Records</h1>
            <p>Neurodiverse Künstler aus dem Spektrum</p>
        </div>
    </section>

    <!-- ARTISTS -->
    <section class="projects-section">
        <div class="section-banner">Projekte</div>

        <div class="projects-grid">

            <div class="artist-card" onclick="openArtistModal('skaramush-vandango')">
                <img src="images/skaramush-vandango.png">
            </div>

            <div class="artist-card" onclick="openArtistModal('silberstreif')">
                <img src="images/silberstreif.png">
            </div>

            <div class="artist-card" onclick="openArtistModal('anger-uschis')">
                <img src="images/anger-uschis.png">
            </div>

            <div class="artist-card" onclick="openArtistModal('henri-bellieu')">
                <img src="images/henri-bellieu.png">
            </div>

            <div class="artist-card" onclick="openArtistModal('fleur-et-beunie')">
                <img src="images/fleur-et-beunie.png">
            </div>

            <div class="artist-card" onclick="openArtistModal('sukram')">
                <img src="images/sukram.png">
            </div>

            <div class="artist-card" onclick="openArtistModal('skank-schablonski')">
                <img src="images/skank-schablonski.png">
            </div>

            <div class="artist-card" onclick="openArtistModal('anthony-sinclair')">
                <img src="images/anthony-sinclair.png">
            </div>

            <!-- MERCH (NEUER TAB) -->
            <a class="artist-card" href="https://rokko-records.myspreadshop.de" target="_blank">
                <img src="images/merch.png">
            </a>

        </div>
    </section>

    <!-- YOUTUBE -->
    <section class="youtube-section">
        <div class="section-banner">YouTube</div>
        <div class="youtube-container">
            <div id="youtubeGrid" class="youtube-grid"></div>
        </div>
    </section>

    <!-- NEWSLETTER -->
    <section class="newsletter-section">
        <h2>Newsletter</h2>

        <form onsubmit="handleNewsletterSubmit(event)">
            <input type="email" required placeholder="Email">
            <button type="submit">Abonnieren</button>
        </form>
    </section>

    <!-- FOOTER -->
    <footer class="footer">
        <h3>Impressum</h3>
        <p>ROKKO! Records</p>
    </footer>

</div>

<script src="script.js"></script>
</body>
</html>
