<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ROKKO! Records</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<header class="header">
    <img src="images/header.png" alt="ROKKO">
</header>

<div class="container">

<!-- WELCOME -->
<section class="section">
    <div class="banner-wrapper">
        <div class="banner-back orange"></div>
        <div class="banner-front black">
            <h1>Willkommen bei ROKKO! Records</h1>
            <p>Independent Label für elektronische Musik.</p>
        </div>
    </div>
</section>

<!-- ARTISTS -->
<section>
    <div class="banner-wrapper">
        <div class="banner-back black"></div>
        <div class="banner-front orange">
            <h2>Artists</h2>
        </div>
    </div>

    <div class="grid">

        <div class="card-wrapper" data-artist="anger-uschis">
            <div class="card-back orange"></div>
            <div class="card black"><img src="images/anger-uschis.png"></div>
        </div>

        <div class="card-wrapper" data-artist="silberstreif">
            <div class="card-back black"></div>
            <div class="card orange"><img src="images/silberstreif.png"></div>
        </div>

        <div class="card-wrapper" data-artist="henri-bellieu">
            <div class="card-back orange"></div>
            <div class="card black"><img src="images/henri-bellieu.png"></div>
        </div>

        <div class="card-wrapper" data-artist="fleur-et-beunie">
            <div class="card-back black"></div>
            <div class="card orange"><img src="images/fleur-et-beunie.png"></div>
        </div>

        <div class="card-wrapper" data-artist="sukram">
            <div class="card-back orange"></div>
            <div class="card black"><img src="images/sukram.png"></div>
        </div>

        <div class="card-wrapper" data-artist="skaramush-vandango">
            <div class="card-back black"></div>
            <div class="card orange"><img src="images/skaramush-vandango.png"></div>
        </div>

        <div class="card-wrapper" data-artist="anthony-sinclair">
            <div class="card-back orange"></div>
            <div class="card black"><img src="images/anthony-sinclair.png"></div>
        </div>

    </div>
</section>

<!-- MERCH -->
<section>
    <div class="banner-wrapper">
        <div class="banner-back orange"></div>
        <div class="banner-front black">
            <h2>Merch</h2>
        </div>
    </div>

    <a href="merch.png" target="_blank">
        <img src="images/merch.png" class="fullimg">
    </a>
</section>

<!-- NEWSLETTER -->
<section>
    <div class="banner-wrapper">
        <div class="banner-back black"></div>
        <div class="banner-front orange">
            <h2>Newsletter</h2>
        </div>
    </div>

    <input type="email" placeholder="Email">
    <button>Join</button>
</section>

<!-- IMPRESSUM -->
<footer>
    <div class="banner-wrapper">
        <div class="banner-back orange"></div>
        <div class="banner-front black">
            <h2>Impressum</h2>
        </div>
    </div>

    <p>ROKKO! Records ©</p>
</footer>

</div>

<!-- MODAL -->
<div id="artistModal" class="modal hidden">
    <div class="modal-content">
        <button onclick="closeArtistModal()">X</button>
        <h2 id="modalArtistName"></h2>
        <p id="modalArtistBio"></p>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
