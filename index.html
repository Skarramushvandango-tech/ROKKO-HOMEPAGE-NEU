<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ROKKO! Records</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<header class="header">
    <img src="images/header.png" alt="ROKKO">
</header>

<div class="container">

<!-- WELCOME -->
<section class="box">
    <div class="banner orange">Welcome</div>
    <h1 id="welcomeTitle"></h1>
    <p id="welcomeText"></p>
</section>

<!-- ARTISTS -->
<section>
    <div class="banner black">Artists</div>

    <div class="grid">

        <div class="card dark" data-artist="anger-uschis"><img src="images/anger-uschis.png"></div>
        <div class="card light" data-artist="silberstreif"><img src="images/silberstreif.png"></div>
        <div class="card dark" data-artist="henri-bellieu"><img src="images/henri-bellieu.png"></div>
        <div class="card light" data-artist="fleur-et-beunie"><img src="images/fleur-et-beunie.png"></div>
        <div class="card dark" data-artist="sukram"><img src="images/sukram.png"></div>
        <div class="card light" data-artist="skaramush-vandango"><img src="images/skaramush-vandango.png"></div>
        <div class="card dark" data-artist="anthony-sinclair"><img src="images/anthony-sinclair.png"></div>

    </div>
</section>

<!-- MERCH -->
<section>
    <div class="banner orange">Merch</div>
    <a href="merch.png" target="_blank">
        <img src="merch.png" class="fullimg">
    </a>
</section>

<!-- NEWSLETTER -->
<section>
    <div class="banner black">Newsletter</div>
    <input type="email" placeholder="Email">
    <button>Join</button>
</section>

<!-- IMPRESSUM -->
<footer>
    <div class="banner orange">Impressum</div>
    <p>ROKKO! Records ©</p>
</footer>

</div>

<!-- MODAL -->
<div id="artistModal" class="modal hidden">
    <div class="modal-content">
        <button onclick="closeArtistModal()">X</button>
        <h2 id="modalArtistName"></h2>
        <p id="modalArtistBio"></p>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
