<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ROKKO! Records</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<header class="header">
    <img src="images/header.png" alt="ROKKO">
</header>

<div class="container">

<!-- WELCOME -->
<section>
    <div class="banner-wrapper">
        <div class="banner-back orange"></div>
        <div class="banner-front black">
            <h1>Willkommen bei ROKKO! Records</h1>
            <p>Independent Label für elektronische Musik.</p>
        </div>
    </div>
</section>

<!-- ARTISTS -->
<section>
    <div class="banner-wrapper">
        <div class="banner-back black"></div>
        <div class="banner-front orange">
            <h2>Artists</h2>
        </div>
    </div>

    <div class="banner-wrapper">
        <div class="banner-back black"></div>
        <div class="banner-front orange">

            <div class="artist-grid">

                <div class="artist-card" data-artist="anger-uschis"><img src="images/anger-uschis.png"></div>
                <div class="artist-card" data-artist="silberstreif"><img src="images/silberstreif.png"></div>
                <div class="artist-card" data-artist="henri-bellieu"><img src="images/henri-bellieu.png"></div>
                <div class="artist-card" data-artist="fleur-et-beunie"><img src="images/fleur-et-beunie.png"></div>
                <div class="artist-card" data-artist="sukram"><img src="images/sukram.png"></div>
                <div class="artist-card" data-artist="skaramush-vandango"><img src="images/skaramush-vandango.png"></div>
                <div class="artist-card" data-artist="anthony-sinclair"><img src="images/anthony-sinclair.png"></div>

            </div>

        </div>
    </div>
</section>

<!-- MERCH -->
<section>
    <div class="banner-wrapper">
        <div class="banner-back orange"></div>
        <div class="banner-front black">
            <h2>Merch</h2>
        </div>
    </div>

    <a href="https://rokko-records.myspreadshop.de" target="_blank" rel="noopener noreferrer">
        <img src="images/merch.png" class="fullimg">
    </a>
</section>

</div>

<!-- MODAL -->
<div id="artistModal" class="modal hidden">
    <div class="modal-content">
        <button onclick="closeArtistModal()">X</button>
        <h2 id="modalArtistName"></h2>
        <p id="modalArtistBio"></p>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
