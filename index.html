<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROKKO! Records</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

<!-- VIDEO -->
<div id="videoPopup" class="video-popup hidden">
    <div class="video-container">
        <button class="close-btn" onclick="closeVideoPopup()">×</button>

        <video id="introVideo" autoplay muted playsinline>
            <source src="videos/intro-web.mp4" type="video/mp4">
            <source src="videos/intro-mobile.mp4" type="video/mp4">
        </video>

        <button class="mute-btn" onclick="toggleMute()">Ton an/aus</button>
    </div>
</div>

<!-- ARTIST MODAL -->
<div id="artistModal" class="artist-modal hidden">
    <div class="modal-content">
        <button class="close-btn" onclick="closeArtistModal()">×</button>

        <img id="modalArtistImage" alt="">
        <h2 id="modalArtistName"></h2>
        <p id="modalArtistBio"></p>

        <div id="modalStreamingLinks"></div>
    </div>
</div>

<div class="container">

    <header class="header">
        <img src="images/header.png" class="header-image" alt="ROKKO! Records">
    </header>

    <section class="welcome">
        <div class="banner">Willkommen</div>
    </section>

    <section class="projects">
        <div class="banner">Projekte</div>

        <div class="grid">

            <div class="card" onclick="openArtist('skaramush-vandango')">
                <img src="images/skaramush-vandango.png">
            </div>

            <div class="card" onclick="openArtist('silberstreif')">
                <img src="images/silberstreif.png">
            </div>

            <div class="card" onclick="openArtist('anger-uschis')">
                <img src="images/anger-uschis.png">
            </div>

            <div class="card" onclick="openArtist('henri-bellieu')">
                <img src="images/henri-bellieu.png">
            </div>

            <div class="card" onclick="openArtist('fleur-et-beunie')">
                <img src="images/fleur-et-beunie.png">
            </div>

            <div class="card" onclick="openArtist('sukram')">
                <img src="images/sukram.png">
            </div>

            <div class="card" onclick="openArtist('skank-schablonski')">
                <img src="images/skank-schablonski.png">
            </div>

            <div class="card" onclick="openArtist('anthony-sinclair')">
                <img src="images/anthony-sinclair.png">
            </div>

            <a class="card" href="https://rokko-records.myspreadshop.de" target="_blank" rel="noopener">
                <img src="images/merch.png">
            </a>

        </div>
    </section>

</div>

<script src="script.js"></script>
</body>
</html>
