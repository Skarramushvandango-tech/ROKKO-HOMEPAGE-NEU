<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ROKKO! Records</title>

<link rel="stylesheet" href="styles.css">
</head>

<body>

<header class="header">
    <img src="images/header.png" alt="ROKKO">
</header>

<div class="container">

<!-- WELCOME -->
<section>
    <div class="banner-wrapper">
        <div class="banner-back orange"></div>
        <div class="banner-front black">
            <h1>Willkommen bei ROKKO! Records</h1>
            <p>Independent Label für elektronische Musik.</p>
        </div>
    </div>
</section>

<!-- ARTISTS (1 KACHEL SYSTEM) -->
<section>
    <div class="banner-wrapper">
        <div class="banner-back black"></div>
        <div class="banner-front orange">
            <h2>Artists</h2>
        </div>
    </div>

    <div class="banner-wrapper">
        <div class="banner-back black"></div>

        <div class="banner-front orange">
            <div class="artist-list">

                <div class="artist-item" data-artist="anger-uschis">Anger Uschis</div>
                <div class="artist-item" data-artist="silberstreif">Silberstreif</div>
                <div class="artist-item" data-artist="henri-bellieu">Henri Bellieu</div>
                <div class="artist-item" data-artist="fleur-et-beunie">Fléur et Beunié</div>
                <div class="artist-item" data-artist="sukram">SUKRAM</div>
                <div class="artist-item" data-artist="skaramush-vandango">SkaRamush Vandango</div>
                <div class="artist-item" data-artist="anthony-sinclair">Anthony Sinclair</div>

            </div>
        </div>
    </div>
</section>

<!-- MERCH (FIX: CLICK OPENS SHOP) -->
<section>
    <div class="banner-wrapper">
        <div class="banner-back orange"></div>
        <div class="banner-front black">
            <h2>Merch</h2>
        </div>
    </div>

    <a href="https://rokko-records.myspreadshop.de" target="_blank" rel="noopener noreferrer">
        <img src="images/merch.png" class="fullimg" alt="Merch Shop">
    </a>
</section>

<!-- NEWSLETTER -->
<section>
    <div class="banner-wrapper">
        <div class="banner-back black"></div>
        <div class="banner-front orange">
            <h2>Newsletter</h2>
        </div>

        <input type="email" placeholder="Email">
        <button>Join</button>
    </div>
</section>

<!-- IMPRESSUM -->
<footer>
    <div class="banner-wrapper">
        <div class="banner-back orange"></div>
        <div class="banner-front black">
            <h2>Impressum</h2>
        </div>

    </div>

    <p>ROKKO! Records ©</p>
</footer>

</div>

<!-- MODAL -->
<div id="artistModal" class="modal hidden">
    <div class="modal-content">
        <button onclick="closeArtistModal()">X</button>
        <h2 id="modalArtistName"></h2>
        <p id="modalArtistBio"></p>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
