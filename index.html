<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ROKKO! Records</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<header class="header">
    <img src="images/header.png" alt="ROKKO">
</header>

<div class="container">

<!-- WELCOME -->
<section>
    <div class="card-wrapper black">
        <div class="card-inner">
            <h1>Willkommen bei ROKKO! Records</h1>
            <p>Independent Label für elektronische Musik.</p>
        </div>
    </div>
</section>

<!-- ARTIST CARDS SYSTEM -->
<section id="artistSystem">

    <!-- CARD 1 -->
    <div class="card-wrapper black">

        <div class="artist-grid">

            <div class="artist" data-id="anger-uschis"><img src="images/anger-uschis.png"></div>
            <div class="artist" data-id="silberstreif"><img src="images/silberstreif.png"></div>

            <div class="artist" data-id="henri-bellieu"><img src="images/henri-bellieu.png"></div>
            <div class="artist" data-id="fleur-et-beunie"><img src="images/fleur-et-beunie.png"></div>

        </div>
    </div>

    <!-- CARD 2 -->
    <div class="card-wrapper orange">

        <div class="artist-grid">

            <div class="artist" data-id="sukram"><img src="images/sukram.png"></div>
            <div class="artist" data-id="skaramush-vandango"><img src="images/skaramush-vandango.png"></div>

            <div class="artist" data-id="anthony-sinclair"><img src="images/anthony-sinclair.png"></div>

        </div>
    </div>

</section>

<!-- MERCH -->
<section>
    <div class="card-wrapper black">
        <h2>Merch</h2>
        <a href="https://rokko-records.myspreadshop.de" target="_blank">
            <img src="images/merch.png">
        </a>
    </div>
</section>

</div>

<!-- FULLSCREEN POPUP -->
<div id="popup" class="popup hidden">
    <div class="popup-content">
        <h1 id="popupName"></h1>
        <p id="popupBio"></p>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
